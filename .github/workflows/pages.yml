# Build the Eleventy site and deploy it to GitHub Pages.
# One-time setup in the repo: Settings -> Pages -> Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish Pages via the official deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy at a time; don't cancel an in-progress release.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        # Project page lives under /slopwatch/, so links/assets need the prefix.
        env:
          PATH_PREFIX: /slopwatch/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
